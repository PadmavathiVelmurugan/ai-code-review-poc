<div class="container mt-4">

  <h2>Shopping Cart</h2>

  <table class="table table-bordered">

    <thead>

      <tr>
        <th>Product</th>
        <th>Quantity</th>
        <th>Price</th>
      </tr>

    </thead>

    <tbody>

      <tr *ngFor="let item of items">

        <td>{{item.product.name}}</td>

        <td>{{item.quantity}}</td>

        <td>{{item.product.price}}</td>

      </tr>

    </tbody>

  </table>

</div>
