<h1>Products Page</h1>

<h2>Total Products: {{ products.length }}</h2>

<div *ngIf="products.length > 0">

  <div
    *ngFor="let product of products"
    class="card mb-3 p-3 border">

    <h3>{{ product.name }}</h3>

    <p>{{ product.description }}</p>

    <p>
      Price:
      ₹{{ product.price }}
    </p>

    <p>
      Quantity:
      {{ product.quantity }}
    </p>

    <button
      class="btn btn-primary"
      (click)="addToCart(product)">
      Add To Cart
    </button>

  </div>

</div>

<div *ngIf="products.length === 0">
  No products found.
</div>
