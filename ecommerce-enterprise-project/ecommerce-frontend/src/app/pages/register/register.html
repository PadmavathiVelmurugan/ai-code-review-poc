<div class="container mt-5">

 <div class="card p-4">

  <h2>Register</h2>

  <input
   class="form-control mb-3"
   placeholder="Name"
   [(ngModel)]="user.name">

  <input
   class="form-control mb-3"
   placeholder="Email"
   [(ngModel)]="user.email">

  <input
   type="password"
   class="form-control mb-3"
   placeholder="Password"
   [(ngModel)]="user.password">

  <button
   class="btn btn-success"
   (click)="register()">

   Register

  </button>

 </div>

</div>
